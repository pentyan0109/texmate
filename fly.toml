# fly.toml app configuration file generated for texmate on 2026-04-01T18:47:30+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'texmate'
primary_region = 'nrt'

[build]

[env]
  LATEX_BIN_DIR = '/usr/bin'
  NODE_ENV = 'production'
  PROJECTS_DIR = '/data/projects'

[[mounts]]
  source = 'texmate_projects'
  destination = '/data/projects'
  initial_size = '3gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
